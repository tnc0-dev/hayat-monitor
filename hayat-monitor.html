<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hayat Monitör</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiSGF5YXQgTW9uaXTDtnIiLCJzaG9ydF9uYW1lIjoiSE1vbml0w7ZyIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBhMGEwYiIsInRoZW1lX2NvbG9yIjoiIzBhMGEwYiJ9">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0b;color:#fff;font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
input[type="number"]::-webkit-inner-spin-button{opacity:1}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease}
button{-webkit-tap-highlight-color:transparent}

</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

/* ── utils ── */
const uid=()=>Math.random().toString(36).slice(2,10);
const MO=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const fmt=n=>new Intl.NumberFormat("tr-TR").format(n);
const td=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
const pm=d=>{const p=new Date(d);return `${p.getFullYear()}-${String(p.getMonth()+1).padStart(2,"0")}`};
const ld=(k,f)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):f}catch{return f}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

/* ── icons ── */
const IPlus=()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const ICheck=()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const ITrash=()=><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>;
const IChev=({d})=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points={d==="l"?"15 18 9 12 15 6":"9 6 15 12 9 18"}/></svg>;

const TH={
  finans:{ac:"#22c55e",bg:"rgba(34,197,94,0.08)",bd:"rgba(34,197,94,0.2)"},
  eventler:{ac:"#f59e0b",bg:"rgba(245,158,11,0.08)",bd:"rgba(245,158,11,0.2)"},
  icerikler:{ac:"#8b5cf6",bg:"rgba(139,92,246,0.08)",bd:"rgba(139,92,246,0.2)"},
};

const inp={width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"12px 16px",color:"#fff",fontSize:14,outline:"none",boxSizing:"border-box"};

/* ═══════════════════════════════════════════
   FINANS
   ═══════════════════════════════════════════ */
function FinansTab(){
  const t=TH.finans;
  const [bakiye,setBakiye]=useState(()=>ld("f_b",0));
  const [gelirler,setGelirler]=useState(()=>ld("f_g",[]));
  const [giderler,setGiderler]=useState(()=>ld("f_gd",[]));
  const [input,setInput]=useState("");
  const [mode,setMode]=useState("gelir");
  const [editB,setEditB]=useState(false);
  const [bInp,setBInp]=useState("");
  const [vMonth,setVMonth]=useState(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`});

  useEffect(()=>{sv("f_b",bakiye)},[bakiye]);
  useEffect(()=>{sv("f_g",gelirler)},[gelirler]);
  useEffect(()=>{sv("f_gd",giderler)},[giderler]);

  // Tekrarlayan giderleri yeni aya taşı
  useEffect(()=>{
    const lc=ld("f_lc",null);
    const now=new Date();
    const cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    if(lc!==cm){
      const rec=giderler.filter(g=>g.recurring);
      if(rec.length>0){
        const existing=giderler.filter(g=>g.recurring&&pm(g.date)===cm).map(g=>g.origId||g.id);
        const toAdd=rec.filter(g=>pm(g.date)!==cm&&!existing.includes(g.origId||g.id))
          .map(g=>({...g,id:uid(),date:`${cm}-01`,carried:true,origId:g.origId||g.id}));
        if(toAdd.length>0) setGiderler(p=>[...p,...toAdd]);
      }
      sv("f_lc",cm);
    }
  },[]);

  // Ayın 5'i bakiye güncelle
  useEffect(()=>{
    const now=new Date();
    if(now.getDate()>=5){
      const lu=ld("f_lu",null);
      const cm=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
      if(lu!==cm){
        const prev=new Date(now.getFullYear(),now.getMonth()-1,1);
        const pMonth=`${prev.getFullYear()}-${String(prev.getMonth()+1).padStart(2,"0")}`;
        const pG=gelirler.filter(g=>pm(g.date)===pMonth).reduce((s,g)=>s+g.amount,0);
        const pGd=giderler.filter(g=>pm(g.date)===pMonth).reduce((s,g)=>s+g.amount,0);
        const diff=pG-pGd;
        if(diff!==0) setBakiye(p=>p+diff);
        sv("f_lu",cm);
      }
    }
  },[gelirler,giderler]);

  const parseInput=(text)=>{
    const parts=text.split(":");
    if(parts.length>=2){
      const title=parts.slice(0,-1).join(":").trim();
      const amtStr=parts[parts.length-1].replace(/[^\d.,]/g,"").replace(",",".");
      const amount=parseFloat(amtStr);
      if(title&&!isNaN(amount)&&amount>0) return {title,amount};
    }
    return null;
  };

  const addItem=()=>{
    const p=parseInput(input);
    if(!p) return;
    const item={id:uid(),...p,date:td(),recurring:mode==="tekrar"};
    if(mode==="gelir") setGelirler(prev=>[...prev,item]);
    else setGiderler(prev=>[...prev,{...item,origId:item.id}]);
    setInput("");
  };

  const removeItem=(id,type)=>{
    if(type==="gelir") setGelirler(p=>p.filter(g=>g.id!==id));
    else setGiderler(p=>p.filter(g=>g.id!==id));
  };

  const mG=gelirler.filter(g=>pm(g.date)===vMonth);
  const mGd=giderler.filter(g=>pm(g.date)===vMonth);
  const tG=mG.reduce((s,g)=>s+g.amount,0);
  const tGd=mGd.reduce((s,g)=>s+g.amount,0);
  const net=tG-tGd;

  const chMonth=(dir)=>{
    const [y,m]=vMonth.split("-").map(Number);
    const d=new Date(y,m-1+dir,1);
    setVMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
  };
  const [vy,vm]=vMonth.split("-").map(Number);

  const saveBakiye=()=>{const v=parseFloat(bInp.replace(/[^\d.,]/g,"").replace(",","."));if(!isNaN(v)){setBakiye(v);setEditB(false)}};

  return <div style={{padding:20,maxWidth:600,margin:"0 auto"}} className="fade-up">
    {/* Bakiye */}
    <div style={{background:"linear-gradient(135deg,#0a1a0f,#0d2818,#0a1a0f)",border:"1px solid "+t.bd,borderRadius:16,padding:24,marginBottom:24,boxShadow:"0 4px 24px rgba(34,197,94,0.1)"}}>
      <div style={{fontSize:12,color:"#999",marginBottom:4,letterSpacing:1,textTransform:"uppercase",fontWeight:600}}>Bakiye</div>
      {editB?
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input value={bInp} onChange={e=>setBInp(e.target.value)} placeholder="Yeni bakiye" autoFocus
            style={{...inp,fontSize:18,flex:1,borderColor:t.bd}} onKeyDown={e=>{if(e.key==="Enter")saveBakiye()}}/>
          <button onClick={saveBakiye} style={{background:t.ac,border:"none",borderRadius:8,padding:"10px 18px",color:"#000",fontWeight:700,cursor:"pointer",fontSize:14}}>Kaydet</button>
        </div>
      :
        <div onClick={()=>{setBInp(String(bakiye));setEditB(true)}} style={{cursor:"pointer"}}>
          <span style={{fontSize:36,fontWeight:800,color:"#fff",fontFamily:"'Courier New',monospace"}}>{fmt(bakiye)}</span>
          <span style={{fontSize:18,color:"#666",marginLeft:6}}>₺</span>
          <div style={{fontSize:11,color:"#555",marginTop:4}}>Düzenlemek için tıkla</div>
        </div>
      }
    </div>

    {/* Ay Gezgini */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16,marginBottom:20}}>
      <button onClick={()=>chMonth(-1)} style={{background:"rgba(255,255,255,0.05)",border:"none",borderRadius:8,padding:8,cursor:"pointer",color:"#aaa",display:"flex"}}><IChev d="l"/></button>
      <span style={{fontSize:16,fontWeight:600,color:"#ddd",minWidth:150,textAlign:"center"}}>{MO[vm-1]} {vy}</span>
      <button onClick={()=>chMonth(1)} style={{background:"rgba(255,255,255,0.05)",border:"none",borderRadius:8,padding:8,cursor:"pointer",color:"#aaa",display:"flex"}}><IChev d="r"/></button>
    </div>

    {/* Giriş */}
    <div style={{marginBottom:20}}>
      <div style={{display:"flex",gap:6,marginBottom:10}}>
        {[["gelir","Gelir"],["tek","Tek Seferlik"],["tekrar","Tekrarlayan"]].map(([k,l])=>
          <button key={k} onClick={()=>setMode(k)} style={{flex:1,padding:"9px 4px",borderRadius:8,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
            background:mode===k?(k==="gelir"?t.ac:"#e74c3c"):"rgba(255,255,255,0.05)",
            color:mode===k?"#000":"#888",transition:"all .2s"}}>{l}</button>
        )}
      </div>
      <div style={{display:"flex",gap:8}}>
        <input value={input} onChange={e=>setInput(e.target.value)} placeholder="Örn: Kira: 8000" onKeyDown={e=>e.key==="Enter"&&addItem()} style={{...inp,flex:1}}/>
        <button onClick={addItem} style={{background:mode==="gelir"?t.ac:"#e74c3c",border:"none",borderRadius:10,width:46,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:mode==="gelir"?"#000":"#fff",flexShrink:0}}><IPlus/></button>
      </div>
      <div style={{fontSize:11,color:"#555",marginTop:6}}>Başlık: Tutar şeklinde yaz</div>
    </div>

    {/* Özet */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
      {[["Gelir",tG,t.ac],["Gider",tGd,"#e74c3c"],["Net",net,net>=0?t.ac:"#e74c3c"]].map(([l,v,c])=>
        <div key={l} style={{background:"rgba(255,255,255,0.03)",borderRadius:12,padding:"14px 10px",textAlign:"center",border:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{fontSize:11,color:"#ccc",marginBottom:4,textTransform:"uppercase",letterSpacing:.5,fontWeight:600}}>{l}</div>
          <div style={{fontSize:17,fontWeight:700,color:c,fontFamily:"'Courier New',monospace"}}>{fmt(v)}₺</div>
        </div>
      )}
    </div>

    {/* Listeler */}
    {[["Gelirler",mG,"gelir",t.ac],["Giderler",mGd,"gider","#e74c3c"]].map(([title,items,type,color])=>
      <div key={title} style={{marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:700,color:"#bbb",marginBottom:8,textTransform:"uppercase",letterSpacing:1}}>{title}</div>
        {items.length===0?<div style={{color:"#444",fontSize:13,padding:"12px 0"}}>Henüz kayıt yok</div>
        :items.map(item=>
          <div key={item.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",marginBottom:6,borderRadius:10,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{flex:1}}>
              <span style={{color:"#ddd",fontSize:14}}>{item.title}</span>
              {item.recurring&&<span style={{fontSize:10,color:"#f59e0b",marginLeft:8,background:"rgba(245,158,11,0.15)",padding:"2px 6px",borderRadius:4}}>Tekrarlayan</span>}
            </div>
            <span style={{color,fontWeight:700,fontSize:15,fontFamily:"'Courier New',monospace",marginRight:12}}>
              {type==="gelir"?"+":"-"}{fmt(item.amount)}₺
            </span>
            <button onClick={()=>removeItem(item.id,type)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",padding:4,display:"flex"}}><ITrash/></button>
          </div>
        )}
      </div>
    )}
  </div>;
}

/* ═══════════════════════════════════════════
   EVENTLER
   ═══════════════════════════════════════════ */
function EventlerTab(){
  const t=TH.eventler;
  const [events,setEvents]=useState(()=>ld("ev",[]));
  const [title,setTitle]=useState("");
  const [date,setDate]=useState("");
  const [r1,setR1]=useState("7");
  const [r2,setR2]=useState("1");
  const [showAdd,setShowAdd]=useState(false);

  useEffect(()=>{sv("ev",events)},[events]);

  const addEvent=()=>{
    if(!title.trim()||!date) return;
    setEvents(p=>[...p,{id:uid(),title:title.trim(),date,reminders:[parseInt(r1),parseInt(r2)].filter(r=>r>0).sort((a,b)=>b-a),done:false}].sort((a,b)=>new Date(a.date)-new Date(b.date)));
    setTitle("");setDate("");setShowAdd(false);
  };

  const toggleDone=id=>setEvents(p=>p.map(e=>e.id===id?{...e,done:!e.done}:e));
  const removeEvent=id=>setEvents(p=>p.filter(e=>e.id!==id));

  const daysUntil=d=>{
    const diff=Math.ceil((new Date(d)-new Date())/(864e5));
    if(diff<0) return "Geçti";
    if(diff===0) return "Bugün!";
    if(diff===1) return "Yarın";
    return diff+" gün";
  };

  const gcalUrl=ev=>{
    const d=ev.date.replace(/-/g,"");
    return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(ev.title)}&dates=${d}/${d}&details=${encodeURIComponent("Hayat Monitör")}`;
  };

  const upcoming=events.filter(e=>!e.done&&new Date(e.date)>=new Date(td()));
  const past=events.filter(e=>e.done||new Date(e.date)<new Date(td()));

  const remindEv=upcoming.filter(ev=>{
    const dl=Math.ceil((new Date(ev.date)-new Date())/(864e5));
    return ev.reminders?.some(r=>dl===r);
  });

  return <div style={{padding:20,maxWidth:600,margin:"0 auto"}} className="fade-up">
    {/* Hatırlatma Banner */}
    {remindEv.length>0&&<div style={{background:"linear-gradient(135deg,rgba(245,158,11,0.15),rgba(245,158,11,0.05))",border:"1px solid "+t.bd,borderRadius:12,padding:"14px 18px",marginBottom:20}}>
      <div style={{fontSize:13,fontWeight:700,color:t.ac,marginBottom:6}}>⏰ Hatırlatma</div>
      {remindEv.map(ev=><div key={ev.id} style={{fontSize:13,color:"#ccc",marginBottom:4}}><strong>{ev.title}</strong> — {daysUntil(ev.date)}</div>)}
    </div>}

    {/* Ekle Butonu */}
    {!showAdd&&<button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:14,borderRadius:12,border:"1px dashed "+t.bd,background:t.bg,color:t.ac,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:24}}><IPlus/> Yeni Event Ekle</button>}

    {/* Form */}
    {showAdd&&<div style={{background:"rgba(255,255,255,0.03)",border:"1px solid "+t.bd,borderRadius:14,padding:20,marginBottom:24}} className="fade-up">
      <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Event başlığı" style={{...inp,marginBottom:10}}/>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,marginBottom:12}}/>
      <div style={{fontSize:12,color:"#888",marginBottom:8}}>Hatırlatma (kaç gün önce)</div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <div style={{flex:1}}>
          <label style={{fontSize:11,color:"#666",display:"block",marginBottom:4}}>1. Hatırlatma</label>
          <input type="number" value={r1} onChange={e=>setR1(e.target.value)} min="0" style={inp}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:11,color:"#666",display:"block",marginBottom:4}}>2. Hatırlatma</label>
          <input type="number" value={r2} onChange={e=>setR2(e.target.value)} min="0" style={inp}/>
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={addEvent} style={{flex:1,padding:12,borderRadius:10,border:"none",background:t.ac,color:"#000",fontWeight:700,fontSize:14,cursor:"pointer"}}>Ekle</button>
        <button onClick={()=>setShowAdd(false)} style={{padding:"12px 20px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"none",color:"#888",fontSize:14,cursor:"pointer"}}>İptal</button>
      </div>
    </div>}

    {/* Yaklaşan */}
    <div style={{fontSize:13,fontWeight:700,color:"#bbb",marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>Yaklaşan</div>
    {upcoming.length===0?<div style={{color:"#444",fontSize:13,padding:"12px 0",marginBottom:20}}>Henüz event yok</div>
    :upcoming.map(ev=>{
      const du=daysUntil(ev.date);
      const close=du==="Bugün!"||du==="Yarın";
      return <div key={ev.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",marginBottom:8,borderRadius:12,background:close?"rgba(245,158,11,0.08)":"rgba(255,255,255,0.03)",border:"1px solid "+(close?t.bd:"rgba(255,255,255,0.06)")}}>
        <button onClick={()=>toggleDone(ev.id)} style={{width:28,height:28,borderRadius:8,border:"2px solid "+t.bd,background:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:t.ac}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:"#ddd",fontSize:14,fontWeight:500}}>{ev.title}</div>
          <div style={{fontSize:12,color:"#666",marginTop:2}}>
            {new Date(ev.date).toLocaleDateString("tr-TR",{day:"numeric",month:"long",year:"numeric"})}
            {ev.reminders?.length>0&&<span style={{marginLeft:8,color:"#555"}}>🔔 {ev.reminders.join(", ")} gün önce</span>}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:13,fontWeight:700,color:close?t.ac:"#888"}}>{du}</div>
          <a href={gcalUrl(ev)} target="_blank" rel="noopener noreferrer" style={{fontSize:10,color:"#555",textDecoration:"none"}}>📅 Takvime Ekle</a>
        </div>
        <button onClick={()=>removeEvent(ev.id)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",padding:4,display:"flex",flexShrink:0}}><ITrash/></button>
      </div>;
    })}

    {/* Geçmiş */}
    {past.length>0&&<>
      <div style={{fontSize:13,fontWeight:700,color:"#555",marginBottom:10,marginTop:24,textTransform:"uppercase",letterSpacing:1}}>Tamamlanan / Geçmiş</div>
      {past.map(ev=><div key={ev.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",marginBottom:6,borderRadius:12,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",opacity:.6}}>
        <div style={{width:28,height:28,borderRadius:8,background:"rgba(255,255,255,0.05)",display:"flex",alignItems:"center",justifyContent:"center",color:t.ac}}><ICheck/></div>
        <div style={{flex:1}}><div style={{color:"#888",fontSize:14,textDecoration:"line-through"}}>{ev.title}</div><div style={{fontSize:11,color:"#555"}}>{new Date(ev.date).toLocaleDateString("tr-TR")}</div></div>
        <button onClick={()=>removeEvent(ev.id)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",padding:4,display:"flex"}}><ITrash/></button>
      </div>)}
    </>}
  </div>;
}

/* ═══════════════════════════════════════════
   İÇERİKLER
   ═══════════════════════════════════════════ */
const CATS=[
  {key:"kitap",label:"📚 Kitap",color:"#8b5cf6"},
  {key:"film",label:"🎬 Film",color:"#ec4899"},
  {key:"dizi",label:"📺 Dizi",color:"#06b6d4"},
  {key:"video",label:"▶️ Video",color:"#f97316"},
];

function IceriklerTab(){
  const t=TH.icerikler;
  const [items,setItems]=useState(()=>ld("ic",[]));
  const [input,setInput]=useState("");
  const [cat,setCat]=useState("kitap");
  const [view,setView]=useState("list");
  const [rPer,setRPer]=useState("aylik");

  useEffect(()=>{sv("ic",items)},[items]);

  const addItem=()=>{
    if(!input.trim()) return;
    setItems(p=>[...p,{id:uid(),name:input.trim(),category:cat,done:false,addedAt:td(),doneAt:null}]);
    setInput("");
  };
  const toggleDone=id=>setItems(p=>p.map(i=>i.id===id?{...i,done:!i.done,doneAt:!i.done?td():null}:i));
  const removeItem=id=>setItems(p=>p.filter(i=>i.id!==id));

  const now=new Date();
  const thisM=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const thisY=`${now.getFullYear()}`;
  const doneItems=items.filter(i=>i.done&&i.doneAt);

  const getStats=period=>{
    let f=doneItems;
    if(period==="aylik") f=doneItems.filter(i=>pm(i.doneAt)===thisM);
    else if(period==="yillik") f=doneItems.filter(i=>i.doneAt?.startsWith(thisY));
    const s={};
    CATS.forEach(c=>{s[c.key]=f.filter(i=>i.category===c.key).length});
    s.total=f.length;
    return s;
  };
  const stats=getStats(rPer);
  const maxS=Math.max(...CATS.map(c=>stats[c.key]),1);

  return <div style={{padding:20,maxWidth:600,margin:"0 auto"}} className="fade-up">
    {/* Görünüm */}
    <div style={{display:"flex",gap:6,marginBottom:20}}>
      {[["list","İçerikler"],["rapor","Rapor"]].map(([k,l])=>
        <button key={k} onClick={()=>setView(k)} style={{flex:1,padding:10,borderRadius:10,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",
          background:view===k?t.ac:"rgba(255,255,255,0.05)",color:view===k?"#000":"#888",transition:"all .2s"}}>{l}</button>
      )}
    </div>

    {view==="list"?<>
      {/* Kategori */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {CATS.map(c=><button key={c.key} onClick={()=>setCat(c.key)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"none",fontSize:11,fontWeight:600,cursor:"pointer",
          background:cat===c.key?c.color:"rgba(255,255,255,0.05)",color:cat===c.key?"#fff":"#888",transition:"all .2s"}}>{c.label}</button>)}
      </div>
      {/* Giriş */}
      <div style={{display:"flex",gap:8,marginBottom:24}}>
        <input value={input} onChange={e=>setInput(e.target.value)} placeholder={CATS.find(c=>c.key===cat)?.label+" ismi..."} onKeyDown={e=>e.key==="Enter"&&addItem()} style={{...inp,flex:1}}/>
        <button onClick={addItem} style={{background:CATS.find(c=>c.key===cat)?.color,border:"none",borderRadius:10,width:46,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",flexShrink:0}}><IPlus/></button>
      </div>
      {/* Listeler */}
      {CATS.map(c=>{
        const ci=items.filter(i=>i.category===c.key);
        if(ci.length===0) return null;
        return <div key={c.key} style={{marginBottom:20}}>
          <div style={{fontSize:13,fontWeight:700,color:c.color,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>{c.label} <span style={{color:"#555",fontWeight:400}}>({ci.length})</span></div>
          {ci.map(item=><div key={item.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:6,borderRadius:10,background:item.done?"rgba(255,255,255,0.02)":"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",opacity:item.done?.6:1}}>
            <button onClick={()=>toggleDone(item.id)} style={{width:26,height:26,borderRadius:7,border:item.done?"none":"2px solid "+c.color+"40",background:item.done?c.color:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff"}}>{item.done&&<ICheck/>}</button>
            <span style={{flex:1,color:item.done?"#666":"#ddd",fontSize:14,textDecoration:item.done?"line-through":"none"}}>{item.name}</span>
            {item.doneAt&&<span style={{fontSize:11,color:"#555"}}>{new Date(item.doneAt).toLocaleDateString("tr-TR")}</span>}
            <button onClick={()=>removeItem(item.id)} style={{background:"none",border:"none",color:"#444",cursor:"pointer",padding:4,display:"flex"}}><ITrash/></button>
          </div>)}
        </div>;
      })}
      {items.length===0&&<div style={{color:"#444",fontSize:13,textAlign:"center",padding:40}}>Henüz içerik eklenmedi</div>}
    </>:<>
      {/* RAPOR */}
      <div style={{display:"flex",gap:6,marginBottom:24}}>
        {[["aylik","Bu Ay"],["yillik","Bu Yıl"],["toplam","Toplam"]].map(([k,l])=>
          <button key={k} onClick={()=>setRPer(k)} style={{flex:1,padding:8,borderRadius:8,border:"none",fontSize:12,fontWeight:600,cursor:"pointer",
            background:rPer===k?t.ac:"rgba(255,255,255,0.05)",color:rPer===k?"#000":"#888",transition:"all .2s"}}>{l}</button>
        )}
      </div>
      <div style={{background:"linear-gradient(135deg,rgba(139,92,246,0.12),rgba(139,92,246,0.04))",border:"1px solid "+t.bd,borderRadius:14,padding:24,textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:48,fontWeight:800,color:t.ac,fontFamily:"'Courier New',monospace"}}>{stats.total}</div>
        <div style={{fontSize:13,color:"#888",marginTop:4}}>Toplam Tüketilen İçerik</div>
      </div>
      {CATS.map(c=><div key={c.key} style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
          <span style={{fontSize:13,color:"#bbb"}}>{c.label}</span>
          <span style={{fontSize:14,fontWeight:700,color:c.color,fontFamily:"'Courier New',monospace"}}>{stats[c.key]}</span>
        </div>
        <div style={{height:8,borderRadius:4,background:"rgba(255,255,255,0.05)",overflow:"hidden"}}>
          <div style={{height:"100%",borderRadius:4,background:c.color,width:(stats[c.key]/maxS)*100+"%",transition:"width .5s ease"}}/>
        </div>
      </div>)}
    </>}
  </div>;
}

/* ═══════════════════════════════════════════
   ANA UYGULAMA
   ═══════════════════════════════════════════ */
const TABS=[
  {key:"finans",label:"Finans",emoji:"💰"},
  {key:"eventler",label:"Eventler",emoji:"📅"},
  {key:"icerikler",label:"İçerikler",emoji:"📚"},
];

function App(){
  const [tab,setTab]=useState("finans");
  const theme=TH[tab];
  return <div style={{minHeight:"100vh",background:"#0a0a0b",color:"#fff",fontFamily:"-apple-system,'Segoe UI','Helvetica Neue',sans-serif",maxWidth:"100vw",overflow:"hidden"}}>
    {/* Header */}
    <div style={{padding:"16px 20px 0",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"linear-gradient(180deg,#111113,#0a0a0b)",position:"sticky",top:0,zIndex:10}}>
      <div style={{fontSize:20,fontWeight:800,color:"#fff",marginBottom:14,letterSpacing:-.5}}>
        <span style={{color:theme.ac,transition:"color .3s"}}>◉</span> Hayat Monitör
      </div>
      <div style={{display:"flex",gap:0}}>
        {TABS.map(t=>{
          const active=tab===t.key;
          return <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"10px 0 14px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,
            color:active?TH[t.key].ac:"#555",borderBottom:active?"2px solid "+TH[t.key].ac:"2px solid transparent",transition:"all .2s"}}>
            <span style={{fontSize:18}}>{t.emoji}</span>
            <span style={{fontSize:11,fontWeight:active?700:500,letterSpacing:.3}}>{t.label}</span>
          </button>;
        })}
      </div>
    </div>
    {/* İçerik */}
    <div style={{paddingBottom:40}}>
      {tab==="finans"&&<FinansTab/>}
      {tab==="eventler"&&<EventlerTab/>}
      {tab==="icerikler"&&<IceriklerTab/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
